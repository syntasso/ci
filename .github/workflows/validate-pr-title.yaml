name: Validate PR title

on:
  workflow_call:
    secrets:
      repo_token:
        required: true

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.repo_token }}
        with:
          # taken from our commitlint config
          types: |
            feat
            fix
            docs
            chore
            ci
            test
            build
            style
            refactor
